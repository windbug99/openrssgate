name: Release OpenRSSGate CLI

on:
  push:
    tags:
      - "openrssgate-cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "CLI version (for example 0.1.0)"
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: cli

    outputs:
      version: ${{ steps.meta.outputs.version }}
      sdist_name: ${{ steps.meta.outputs.sdist_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#openrssgate-cli-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sdist_name=openrssgate-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Verify CLI version
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          grep -q "version = \"${VERSION}\"" pyproject.toml
          grep -q "version=\"${VERSION}\"" setup.py
          grep -q "__version__ = \"${VERSION}\"" openrssgate/__init__.py

      - name: Install build tools
        run: python -m pip install --upgrade build twine pytest

      - name: Run CLI tests
        run: python -m pytest tests/test_client.py

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openrssgate-cli-dist
          path: cli/dist/*

  prepare-homebrew:
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: read

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: openrssgate-cli-dist
          path: cli/dist

      - name: Render Homebrew formula
        shell: bash
        run: |
          VERSION="${{ needs.build-and-publish.outputs.version }}"
          SDIST_NAME="${{ needs.build-and-publish.outputs.sdist_name }}"
          python homebrew/prepare_formula_release.py \
            --archive "dist/${SDIST_NAME}" \
            --url "https://files.pythonhosted.org/packages/source/o/openrssgate/${SDIST_NAME}" \
            --output "homebrew/Formula/openrssgate.rb"

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: openrssgate-homebrew-formula
          path: cli/homebrew/Formula/openrssgate.rb
